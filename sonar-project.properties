# SonarCloud — must match Project Settings → Project key / Organization
# (SonarLint: NextStepGuru_dineros.cc @ nextstepguru)
sonar.organization=nextstepguru
sonar.projectKey=NextStepGuru_dineros.cc
sonar.projectName=dineros.cc

sonar.host.url=https://sonarcloud.io

# Scan the Nuxt app package (paths relative to this file at repo root)
sonar.sources=app
sonar.sourceEncoding=UTF-8

# Vitest (vitest.config.coverage.ts) writes LCOV here when you run pnpm test:coverage
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# SonarJS bridge OOM on default ~2240 MB (multi-tsconfig Nuxt + server); value is MB
sonar.javascript.node.maxspace=4096

# Noise and generated output (comma-separated)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.nuxt/**,**/.output/**,**/dist/**,**/prisma/migrations/**,**/*.test.ts,**/*.spec.ts,**/*.nuxt.test.ts,**/*.nuxt.spec.ts
