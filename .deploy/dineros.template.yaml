# Render with: source .deploy/profiles/<profile>.env && export GCP_PROJECT_ID IMAGE_TAG && envsubst < .deploy/dineros.template.yaml
# Required env: profile exports + GCP_PROJECT_ID, IMAGE_TAG (CI also sets GCP_PROJECT_ID for the GCP_PROJECT_ID env var in containers).
# Image URLs: Google Container Registry gcr.io/PROJECT/IMAGE:tag
apiVersion: v1
kind: Namespace
metadata:
  name: ${K8S_NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MAIN_DEPLOYMENT_NAME}
  labels:
    app: ${APP_LABEL}
  namespace: ${K8S_NAMESPACE}
spec:
  selector:
    matchLabels:
      app: ${APP_LABEL}
  replicas: ${MAIN_REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  minReadySeconds: 10
  template:
    metadata:
      annotations:
        kubernetes.io/change-cause: "Updated at $(date +%s)"
      labels:
        app: ${APP_LABEL}
    spec:
      serviceAccountName: ${SERVICE_ACCOUNT_K8S}
      containers:
        - name: ${MAIN_CONTAINER_NAME}
          image: gcr.io/${GCP_PROJECT_ID}/dineros:${IMAGE_TAG}
          imagePullPolicy: Always
          volumeMounts:
            - name: service-account-volume
              mountPath: /etc/google-service-account
              readOnly: true
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DATABASE_MAIN}
                  key: DATABASE_URL
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: DEPLOY_ENV
              value: "${DEPLOY_ENV_VALUE}"
            - name: NUXT_PUBLIC_SITE_URL
              value: "${NUXT_PUBLIC_SITE_URL}"
            - name: PORT
              value: "80"
            - name: GCP_PROJECT_ID
              value: "${GCP_PROJECT_ID}"
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: TWILIO_ACCOUNT_SID
            - name: NODE_ENV
              value: "production"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_HOST
              value: "redis-master.redis.svc.cluster.local"
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: INTERNAL_API_TOKEN
            - name: MICROSERVICE_INTERNAL_URL
              value: "http://${MICRO_SERVICE_NAME}.${K8S_NAMESPACE}.svc.cluster.local:3050"
            - name: SHOW_BULL_MQ_ADMIN
              value: "false"
            - name: PROJECT_NAME
              value: "comm"
            - name: POSTMARK_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: POSTMARK_SERVER_TOKEN
            - name: POSTMARK_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: POSTMARK_WEBHOOK_SECRET
            - name: DB_DECRYPTION_KEY_1
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_1
            - name: DB_DECRYPTION_KEY_2
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_2
            - name: DB_DECRYPTION_KEY_3
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_3
            - name: DB_DECRYPTION_KEY_4
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_4
            - name: DB_DECRYPTION_KEY_5
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_5
            - name: DB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_ENCRYPTION_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: OPENAI_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_JWT}
                  key: DINEROS_JWT_SECRET
            - name: GCLOUD_KEY_NAME
              value: "./cloud-logging.json"
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: PLAID_CLIENT_ID
            - name: PLAID_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: PLAID_SECRET
${OPTIONAL_NUXT_PUBLIC_DEPLOY_ENV_ENTRY}
${OPTIONAL_E2E_SEED_ENTRY}
            - name: DEBUG
              value: "dineros:error"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/google-service-account/service-account.json
          readinessProbe:
            httpGet:
              path: /api/_ah/readiness
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/_ah/liveness
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 10
      volumes:
        - name: service-account-volume
          secret:
            secretName: ${SECRET_GA}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MICRO_DEPLOYMENT_NAME}
  labels:
    app: ${MICRO_APP_LABEL}
  namespace: ${K8S_NAMESPACE}
spec:
  selector:
    matchLabels:
      app: ${MICRO_APP_LABEL}
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  minReadySeconds: 10
  template:
    metadata:
      annotations:
        kubernetes.io/change-cause: "Updated at $(date +%s)"
      labels:
        app: ${MICRO_APP_LABEL}
    spec:
      serviceAccountName: ${SERVICE_ACCOUNT_K8S}
      containers:
        - name: ${MICRO_CONTAINER_NAME}
          image: gcr.io/${GCP_PROJECT_ID}/dineros-microservice:${IMAGE_TAG}
          imagePullPolicy: Always
          volumeMounts:
            - name: service-account-volume
              mountPath: /etc/google-service-account
              readOnly: true
          ports:
            - name: http
              containerPort: 3050
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DATABASE_MICRO}
                  key: DATABASE_URL
            - name: DEPLOY_ENV
              value: "${DEPLOY_ENV_VALUE}"
            - name: PORT
              value: "3050"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_HOST
              value: "redis-master.redis.svc.cluster.local"
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_APP}
                  key: INTERNAL_API_TOKEN
            - name: DB_DECRYPTION_KEY_1
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_1
            - name: DB_DECRYPTION_KEY_2
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_2
            - name: DB_DECRYPTION_KEY_3
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_3
            - name: DB_DECRYPTION_KEY_4
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_4
            - name: DB_DECRYPTION_KEY_5
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_DECRYPTION_KEY_5
            - name: DB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DB}
                  key: DB_ENCRYPTION_KEY
      volumes:
        - name: service-account-volume
          secret:
            secretName: ${SECRET_GA}
---
apiVersion: v1
kind: Service
metadata:
  name: ${MICRO_SERVICE_NAME}
  labels:
    app: ${MICRO_APP_LABEL}
  namespace: ${K8S_NAMESPACE}
spec:
  selector:
    app: ${MICRO_APP_LABEL}
  ports:
    - protocol: TCP
      port: 3050
      targetPort: 3050
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  labels:
    app: ${APP_LABEL}
  namespace: ${K8S_NAMESPACE}
spec:
  selector:
    app: ${APP_LABEL}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: http
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  labels:
    app: ${APP_LABEL}
  name: ${INGRESS_NAME}
  namespace: ${K8S_NAMESPACE}
spec:
  rules:
    - host: ${PRIMARY_HOST}
      http:
        paths:
          - backend:
              service:
                name: ${SERVICE_NAME}
                port:
                  name: http
            path: /
            pathType: ImplementationSpecific
${SECONDARY_INGRESS_RULE}
  tls:
    - hosts:
${TLS_HOSTS_LIST}
      secretName: ${INGRESS_TLS_SECRET_NAME}
