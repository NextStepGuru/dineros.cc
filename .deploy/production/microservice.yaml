apiVersion: apps/v1
kind: Deployment
metadata:
  name: dineros-microservice-production-deployment
  labels:
    app: dineros-microservice-production
  namespace: dineros
spec:
  selector:
    matchLabels:
      app: dineros-microservice-production
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  minReadySeconds: 10
  template:
    metadata:
      annotations:
        kubernetes.io/change-cause: "Updated at $(date +%s)"
      labels:
        app: dineros-microservice-production
    spec:
      serviceAccountName: dineros
      containers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--address=0.0.0.0"
            - "--port=3306"
            - "${GCP_PROJECT_ID}:${GCP_REGION}:${CLOUDSQL_INSTANCE}"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/google-service-account/service-account.json
          volumeMounts:
            - name: service-account-volume
              mountPath: /etc/google-service-account
              readOnly: true
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
        - name: dineros-microservice-production-container
          image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}/dineros-microservice:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: service-account-volume
              mountPath: /etc/google-service-account
              readOnly: true
          ports:
            - name: http
              containerPort: 3050
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dineros-secrets
                  key: DATABASE_URL
            - name: DEPLOY_ENV
              value: "production"
            - name: PORT
              value: "3050"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_HOST
              value: "redis-master.redis.svc.cluster.local"
            - name: DB_DECRYPTION_KEY_1
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_DECRYPTION_KEY_1
            - name: DB_DECRYPTION_KEY_2
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_DECRYPTION_KEY_2
            - name: DB_DECRYPTION_KEY_3
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_DECRYPTION_KEY_3
            - name: DB_DECRYPTION_KEY_4
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_DECRYPTION_KEY_4
            - name: DB_DECRYPTION_KEY_5
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_DECRYPTION_KEY_5
            - name: DB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: production-db-secrets
                  key: DB_ENCRYPTION_KEY
      volumes:
        - name: service-account-volume
          secret:
            secretName: google-service-account
