repos:
  - repo: local
    hooks:
      - id: trufflehog-filesystem
        name: TruffleHog Enhanced Security Scanner
        entry: scripts/trufflehog-enhanced.sh
        language: system
        types: [file]
        files: .* # run for all files
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]
        additional_dependencies: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(\.deploy/.*\.yaml|runner\.yaml)$
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^(server/services/__tests__/.*\.test\.ts|nextstepguru-ce5dcf7b0730\.json)$
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
