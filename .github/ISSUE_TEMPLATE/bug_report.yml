name: Bug report
description: Report a reproducible problem in Dineros.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail for us to reproduce and fix it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App/commit version
      description: Commit SHA, branch, or tag.
      placeholder: main @ abc1234
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 24.14.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04 / Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before posting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before filing this report.
          required: true
        - label: I removed sensitive data from logs/screenshots.
          required: true

