# Build and deploy only; deploy job waits for GKE rollouts and GET /health/ready on the public URL. PR checks (lint, test, build, pre-commit) run in .github/workflows/pr.yml; staging E2E + manual snapshot workflows are separate.
#
# Container images: Docker Buildx on GitHub Actions, pushed to Google Container Registry (gcr.io/PROJECT/IMAGE), then GKE.
#
# GCP setup (GCR push from CI):
# 0. Workload Identity: gcloud iam service-accounts add-iam-policy-binding github-service-account@your-gcp-project-id.iam.gserviceaccount.com \
#      --project=your-gcp-project-id --role=roles/iam.workloadIdentityUser \
#      --member="principalSet://iam.googleapis.com/projects/000000000000/locations/global/workloadIdentityPools/github-pool/attribute.repository/your-org/your-repo"
# 1. CI service account: roles/storage.admin (legacy GCR) or roles/artifactregistry.writer where applicable; GKE node SA can pull gcr.io images in same project.
name: Build & Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  Build1:
    runs-on: ubuntu-latest
    name: Build Main Site
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: ./.github/actions/build-push-gcr
        with:
          dockerfile: ./app/Dockerfile
          context: .
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/dineros:latest
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/dineros:${{ github.sha }}

  Build2:
    runs-on: ubuntu-latest
    name: Build Microservice
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: ./.github/actions/build-push-gcr
        with:
          dockerfile: ./microservice/Dockerfile
          context: .
          pre_build_command: cd microservice && ./copy-files.sh
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/dineros-microservice:latest
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/dineros-microservice:${{ github.sha }}

  Deploy:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy
    needs: [Build1, Build2]
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@v6
      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
      - id: "get-credentials"
        uses: "google-github-actions/get-gke-credentials@v2"
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
      - uses: ./.github/actions/deploy-dineros-gke
        with:
          profile: production
          image_tag: ${{ github.sha }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      - name: Verify production rollout and public health
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/verify-dineros-gke-deploy.sh" production
