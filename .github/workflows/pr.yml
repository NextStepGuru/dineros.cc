# Runs on PRs: unit tests, lint, pre-security checks; build/push app + microservice (same as production), deploy to GKE staging.
# Staging Playwright E2E is not run in CI (run locally: pnpm test:e2e with PLAYWRIGHT_BASE_URL).
# Refresh Linux visual baselines vs staging: .github/workflows/e2e-update-staging-snapshots.yml (manual).
# Staging manifests: .deploy/staging/dineros.yaml (namespace dineros-staging). Fork PRs skip deploy (no WIF).
name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"
      NODE_ENV: test
      CI: true
      TZ: UTC
      # Minimal values so server/secrets.ts + Zod validate (required for Prisma + Plaid modules in tests)
      DEPLOY_ENV: local
      DB_ENCRYPTION_KEY: "k1.aesgcm256.yQcdOV0BPCyRNiFasjXX5kqelCifs2jpp70GbLrao4c="
      PLAID_CLIENT_ID: "ci-test"
      PLAID_SECRET: "ci-test-secret"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter dineros-app exec prisma generate
      - run: pnpm test

  pre-commit-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: |
          set +e
          pre-commit run --all-files --verbose
          first_exit=$?
          set -e

          if [ "$first_exit" -ne 0 ] && [ -n "$(git status --porcelain)" ]; then
            echo "pre-commit modified files; re-running hooks..."
            pre-commit run --all-files --verbose
          else
            exit "$first_exit"
          fi

  staging-build-main-site:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - pre-commit-security
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
      - name: Build and push main site (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/dineros:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
        env:
          CI: true

  staging-build-microservice:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - pre-commit-security
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Pre-configure microservice
        run: |
          cd microservice
          ./copy-files.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
      - name: Build and push microservice (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./microservice/Dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/dineros-microservice:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
        env:
          CI: true

  staging-deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - pre-commit-security
      - staging-build-main-site
      - staging-build-microservice
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - id: get-credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
      - name: Apply staging (pin images to this PR build)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
        run: |
          RENDERED_MANIFEST=/tmp/dineros-staging.rendered.yaml
          envsubst < ./.deploy/staging/dineros.yaml > "$RENDERED_MANIFEST"
          TAG="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          sed -i "s|dineros:latest|dineros:${TAG}|g" "$RENDERED_MANIFEST"
          sed -i "s|dineros-microservice:latest|dineros-microservice:${TAG}|g" "$RENDERED_MANIFEST"
          kubectl apply -f "$RENDERED_MANIFEST"
