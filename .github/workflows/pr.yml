# Runs on PRs: unit tests, lint, pre-security checks; build/push app + microservice and deploy to GKE staging. E2E: .github/workflows/e2e.yml (manual).
# Staging manifests: .deploy/staging/dineros.yaml (namespace dineros-staging). Fork PRs skip deploy (no WIF).
name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"
      NODE_ENV: test
      CI: true
      TZ: UTC
      # Minimal values so server/env.ts + Zod validate (required for Prisma + Plaid modules in tests)
      DEPLOY_ENV: local
      DB_ENCRYPTION_KEY: "k1.aesgcm256.yQcdOV0BPCyRNiFasjXX5kqelCifs2jpp70GbLrao4c="
      PLAID_CLIENT_ID: "ci-test"
      PLAID_SECRET: "ci-test-secret"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm test

  pre-commit-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --verbose

  staging-build-main-site:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push main site (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/nextstepguru/dineros/dineros:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          CI: true

  staging-build-microservice:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Pre-configure microservice
        run: |
          cd microservice
          ./copy-files.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push microservice (staging)
        uses: docker/build-push-action@v6
        with:
          context: ./microservice/
          file: ./microservice/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/nextstepguru/dineros/dineros-microservice:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          CI: true

  staging-deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - pre-commit-security
      - staging-build-main-site
      - staging-build-microservice
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - id: get-credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: nsg-kube-01
          location: us-central1-a
      - name: Apply staging (pin images to this PR build)
        run: |
          TAG="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          sed -i "s|dineros:latest|dineros:${TAG}|g" ./.deploy/staging/dineros.yaml
          sed -i "s|dineros-microservice:latest|dineros-microservice:${TAG}|g" ./.deploy/staging/dineros.yaml
          kubectl apply -f ./.deploy/staging/dineros.yaml
      - name: Staging cluster diagnostics + rollout
        run: |
          set -x
          kubectl get deploy,svc,ingress,sa -n dineros-staging || true
          kubectl get pods -n dineros-staging -o wide || true
          kubectl get events -n dineros-staging --sort-by=.metadata.creationTimestamp | tail -40 || true
          kubectl describe deployment dineros-staging-deployment -n dineros-staging || true
          kubectl describe deployment dineros-microservice-staging-deployment -n dineros-staging || true
          kubectl rollout status deployment/dineros-staging-deployment -n dineros-staging --timeout=5m
          kubectl rollout status deployment/dineros-microservice-staging-deployment -n dineros-staging --timeout=5m
          kubectl get pods -n dineros-staging -o wide
