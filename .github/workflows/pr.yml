# Runs on PRs: unit tests, lint, pre-security checks; build/push app + microservice, deploy to GKE staging, then Playwright E2E vs https://staging.dineros.cc.
# Refresh Linux visual baselines vs staging: .github/workflows/e2e-update-staging-snapshots.yml (manual).
# Staging manifests: .deploy/staging/dineros.yaml (namespace dineros-staging). Fork PRs skip deploy and staging E2E (no WIF).
name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"
      NODE_ENV: test
      CI: true
      TZ: UTC
      # Minimal values so server/env.ts + Zod validate (required for Prisma + Plaid modules in tests)
      DEPLOY_ENV: local
      DB_ENCRYPTION_KEY: "k1.aesgcm256.yQcdOV0BPCyRNiFasjXX5kqelCifs2jpp70GbLrao4c="
      PLAID_CLIENT_ID: "ci-test"
      PLAID_SECRET: "ci-test-secret"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter dineros-app exec prisma generate
      - run: pnpm test

  pre-commit-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --verbose

  staging-build-main-site:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push main site (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/nextstepguru/dineros/dineros:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          CI: true

  staging-build-microservice:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Pre-configure microservice
        run: |
          cd microservice
          ./copy-files.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push microservice (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./microservice/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/nextstepguru/dineros/dineros-microservice:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          CI: true

  staging-deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - pre-commit-security
      - staging-build-main-site
      - staging-build-microservice
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - id: get-credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: nsg-kube-01
          location: us-central1-a
      - name: Apply staging (pin images to this PR build)
        run: |
          TAG="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          sed -i "s|dineros:latest|dineros:${TAG}|g" ./.deploy/staging/dineros.yaml
          sed -i "s|dineros-microservice:latest|dineros-microservice:${TAG}|g" ./.deploy/staging/dineros.yaml
          kubectl apply -f ./.deploy/staging/dineros.yaml

  staging-e2e:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - staging-deploy
    permissions:
      contents: read
      id-token: write
    env:
      CI: true
      E2E: "1"
      TZ: UTC
      PLAYWRIGHT_BASE_URL: "https://staging.dineros.cc"
      E2E_SEED_TOKEN: ${{ secrets.E2E_SEED_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/809557179036/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-service-account@nextstepguru.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - id: get-credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: nsg-kube-01
          location: us-central1-a
      - name: Wait for staging rollouts
        run: |
          kubectl rollout status deployment/dineros-staging-deployment -n dineros-staging --timeout=300s
          kubectl rollout status deployment/dineros-microservice-staging-deployment -n dineros-staging --timeout=300s
      - name: Wait for staging HTTP
        run: |
          for i in $(seq 1 36); do
            if curl -fsS -o /dev/null --max-time 20 "https://staging.dineros.cc/"; then
              exit 0
            fi
            sleep 10
          done
          echo "staging URL did not become ready" >&2
          exit 1
      - name: Install Playwright Chromium
        run: pnpm --filter dineros-app exec playwright install --with-deps chromium
      - name: E2E against staging
        run: set -o pipefail && pnpm test:e2e 2>&1 | tee ./output.txt
      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
      - name: Upload visual snapshots (actual)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-linux
          path: |
            app/tests/e2e/specs/authed/visual.spec.ts-snapshots/
            app/tests/e2e/specs/public/visual.spec.ts-snapshots/
