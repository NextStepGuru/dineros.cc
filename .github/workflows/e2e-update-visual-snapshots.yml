# Manual only: regenerate Linux Playwright screenshot baselines, then download the artifact and commit the PNGs into the repo.
name: E2E — update visual snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    env:
      CI: true
      E2E: "1"
      TZ: UTC
      NODE_ENV: development
      DEPLOY_ENV: local
      E2E_SEED_TOKEN: ${{ secrets.E2E_SEED_TOKEN }}
      DATABASE_URL: "mysql://ci:ci@127.0.0.1:3306/ci"
      NUXT_PUBLIC_SITE_URL: "http://localhost:3000"
      DB_ENCRYPTION_KEY: "k1.aesgcm256.yQcdOV0BPCyRNiFasjXX5kqelCifs2jpp70GbLrao4c="
      PLAID_CLIENT_ID: "ci-plaid-client-id"
      PLAID_SECRET: "ci-plaid-secret"
      REDIS_HOST: "127.0.0.1"
      REDIS_PORT: "6379"
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci
          MYSQL_USER: ci
          MYSQL_PASSWORD: ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Regenerate visual baselines (Linux)
        run: set -o pipefail && pnpm test:e2e:update-snapshots 2>&1 | tee ./output.txt
      - name: Upload Linux snapshot PNGs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-linux
          path: |
            tests/e2e/specs/authed/visual.spec.ts-snapshots/
            tests/e2e/specs/public/visual.spec.ts-snapshots/
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload console log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-update-snapshots-output
          path: output.txt
