# Build with Docker Buildx and push to Google Container Registry (gcr.io/PROJECT/IMAGE:tag).
# Caller must run google-github-actions/auth (WIF) before this action.
name: Build and push to GCR
description: >
  gcloud auth configure-docker for the registry host, then docker/build-push-action.
  Tags are full references, e.g. gcr.io/my-project/dineros:sha

inputs:
  context:
    description: Docker build context path
    default: "."
    required: false
  dockerfile:
    description: Path to Dockerfile (relative to repo root)
    required: true
  registry_host:
    description: >
      Host for docker credential helper (use gcr.io for Google Container Registry)
    default: "gcr.io"
    required: false
  tags:
    description: Multiline list of full image references (one image:tag per line)
    required: true
  pre_build_command:
    description: Optional shell command to run before build (e.g. microservice copy-files)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Pre-build
      if: ${{ inputs.pre_build_command != '' }}
      shell: bash
      env:
        PRE_BUILD_COMMAND: ${{ inputs.pre_build_command }}
      run: bash -ec "$PRE_BUILD_COMMAND"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

    - name: Configure Docker for GCR
      shell: bash
      env:
        REGISTRY_HOST: ${{ inputs.registry_host }}
      run: gcloud auth configure-docker "$REGISTRY_HOST"

    - name: Build and push
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ inputs.tags }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: true
        sbom: true
      env:
        CI: true
